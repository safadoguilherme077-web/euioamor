<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para minha namoreka</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", sans-serif;
}


html{
    scroll-behavior:smooth;
}


body{

    background:
    linear-gradient(
        180deg,
        #12001f,
        #4c1d95,
        #9333ea,
        #d8b4fe
    );

    min-height:100vh;
    color:white;
    overflow-x:hidden;

}



/* =========================
        MUSICA
========================= */


.controle-musica{

    position:fixed;

    bottom:15px;

    left:15px;

    background:rgba(255,255,255,0.25);

    padding:8px 12px;

    border-radius:20px;

    font-size:14px;

    z-index:999;

}



.controle-musica input{

    width:80px;

}





/* =========================
        CAPA
========================= */


.capa{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    text-align:center;

    padding:25px;

}



.capa h1{

    font-size:60px;

    animation:entrada 2s;

}



.capa p{

    margin-top:25px;

    font-size:21px;

    line-height:1.5;

    max-width:330px;

    animation:entrada 3s;

}



.botao{

    margin-top:45px;

    padding:16px 35px;

    border:none;

    border-radius:50px;

    background:#a855f7;

    color:white;

    font-size:18px;

    animation:entrada 3.5s;

}



.botao:active{

    transform:scale(.95);

}



/* =========================
       POLAROIDS
========================= */


.container{

    padding:50px 20px;

}



.polaroid{


    background:#fff;

    color:#333;

    width:100%;

    max-width:350px;

    margin:60px auto;


    padding:15px;

    padding-bottom:35px;


    box-shadow:

    0 15px 35px rgba(0,0,0,.5);



    transform:rotate(-3deg);


    animation:aparecer 1.5s;


}



.polaroid:nth-child(even){

    transform:rotate(3deg);

}



.polaroid img{


    width:100%;


    height:310px;


    object-fit:cover;


}



.texto{


    margin-top:22px;


    text-align:center;


    font-size:19px;


    font-family:"Comic Sans MS", cursive;


}



/* =========================
       CORAÇÕES
========================= */


.heart{


    position:fixed;

    bottom:-30px;

    font-size:25px;

    animation:subir 8s linear infinite;

    pointer-events:none;


}



@keyframes subir{


0%{

    transform:translateY(0) rotate(0deg);

    opacity:1;

}


100%{


    transform:
    translateY(-120vh)
    rotate(360deg);


    opacity:0;


}

}
